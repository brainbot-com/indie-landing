<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Inventory</title>
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
    <meta name="description" content="Internal admin page for Indiebox stock, system data, and supplier orders.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
</head>
<body class="docs-page admin-page">
    <header class="admin-header">
        <div class="container admin-header__inner">
            <a class="admin-header__logo" href="./inventory.html" aria-label="Indiebox Admin">Indiebox Admin</a>
            <div class="admin-header__actions">
                <form class="admin-header-auth" data-admin-auth-form>
                    <input class="admin-header-auth__input" id="admin-username" type="text" autocomplete="username" placeholder="Username" data-admin-username-input>
                    <input class="admin-header-auth__input" id="admin-password" type="password" autocomplete="current-password" placeholder="Password" data-admin-password-input>
                    <button class="button button--plain-dark button--pill button--sm" type="submit">Sign in</button>
                    <button class="button button--plain-dark button--pill button--sm" type="button" data-admin-clear-auth>Sign out</button>
                </form>
                <span class="admin-header-auth__status" data-admin-auth-status></span>
                <a href="../../admin/inventory.html" class="button button--plain-light button--pill button--sm">DE</a>
            </div>
        </div>
        <div class="container">
            <nav class="admin-subnav" aria-label="Admin sections">
                <a href="./inventory.html" aria-current="page">Inventory</a>
                <a href="./orders.html">Orders</a>
                <a href="./users.html">Users</a>
                <a href="../checkout.html">View checkout</a>
                <a href="../index.html">Website</a>
            </nav>
        </div>
    </header>

    <main class="admin-shell">
        <div class="container admin-layout" data-admin-inventory data-locale="en" data-product-key="indiebox-ai-workstation">

            <nav class="admin-tabs" role="tablist" aria-label="Inventory sections">
                <button class="admin-tab" role="tab" aria-selected="true" data-tab="devices">Devices</button>
                <button class="admin-tab" role="tab" aria-selected="false" data-tab="procurement">Procurement</button>
                <button class="admin-tab" role="tab" aria-selected="false" data-tab="articles">Articles</button>
            </nav>

            <!-- Tab: Devices -->
            <div class="admin-tab-panel" data-tab-panel="devices">
                <section class="admin-card">
                    <div class="admin-card-header">
                        <h2>Devices</h2>
                        <button class="button button--plain-dark button--pill button--sm" type="button" data-new-device>+ Add device</button>
                    </div>
                    <div class="admin-orders-split">
                        <div class="admin-orders-list-pane">
                            <div class="admin-list-filter-bar">
                                <select class="form-input form-input--sm" data-device-filter-status>
                                    <option value="">All statuses</option>
                                    <option value="ordered">On order</option>
                                    <option value="in_stock">In stock</option>
                                    <option value="available">Available</option>
                                    <option value="reserved">Reserved</option>
                                    <option value="assigned">Assigned</option>
                                    <option value="installed">Installed</option>
                                    <option value="retired">Retired</option>
                                </select>
                            </div>
                            <div data-admin-devices-list></div>
                        </div>
                        <div class="admin-orders-detail-pane" data-admin-devices-detail>
                            <div class="admin-detail-placeholder">
                                <p>Select a device to view and edit details.</p>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Tab: Procurement -->
            <div class="admin-tab-panel" data-tab-panel="procurement" hidden>
                <section class="admin-card">
                    <div class="admin-card-header">
                        <h2>Supplier orders</h2>
                        <button class="button button--plain-dark button--pill button--sm" type="button" data-new-supplier-order>+ New order</button>
                    </div>
                    <div class="admin-orders-split">
                        <div class="admin-orders-list-pane">
                            <div data-admin-procurement-list></div>
                        </div>
                        <div class="admin-orders-detail-pane" data-admin-procurement-detail>
                            <div class="admin-detail-placeholder">
                                <p>Select a supplier order or create a new one.</p>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Tab: Articles -->
            <div class="admin-tab-panel" data-tab-panel="articles" hidden>
                <div class="admin-grid">
                    <article class="admin-card">
                        <h2>Create new article</h2>
                        <form class="admin-section-stack" data-admin-article-form>
                            <div class="form-row">
                                <label class="form-label" for="article-manufacturer">Manufacturer</label>
                                <input class="form-input" id="article-manufacturer" name="manufacturer" type="text" placeholder="e.g. ASUS, Minisforum">
                            </div>
                            <div class="form-row">
                                <label class="form-label" for="article-product-name">Article name *</label>
                                <input class="form-input" id="article-product-name" name="productName" type="text" required placeholder="e.g. NUC 14 Pro AI">
                            </div>
                            <div class="form-row">
                                <label class="form-label" for="article-system-spec">Specification</label>
                                <textarea class="form-textarea" id="article-system-spec" name="systemSpec" rows="3" placeholder="e.g. AMD Ryzen AI Max+ 395, 128 GB RAM, 2 TB SSD"></textarea>
                            </div>
                            <button class="button button--plain-dark button--pill button--sm" type="submit">Create article</button>
                        </form>
                    </article>
                    <article class="admin-card">
                        <h2>Customer reservations</h2>
                        <p class="admin-card-lead">Paid orders automatically reserve available stock.</p>
                        <div class="admin-section-stack" data-admin-allocations-list></div>
                    </article>
                </div>
                <section class="admin-card" style="margin-top:1rem">
                    <h2>Article catalogue</h2>
                    <div class="admin-section-stack" data-admin-articles-list></div>
                </section>
            </div>

            <div class="admin-toast" data-admin-feedback hidden></div>
        </div>
    </main>

    <script src="../../script.js"></script>
</body>
</html>
