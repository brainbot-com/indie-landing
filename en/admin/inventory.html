<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Inventory</title>
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
    <meta name="description" content="Internal admin page for Indiebox stock, system data, and supplier orders.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
</head>
<body class="docs-page admin-page">
    <header class="admin-header">
        <div class="container admin-header__inner">
            <a class="admin-header__logo" href="./inventory.html" aria-label="Indiebox Admin">Indiebox Admin</a>
            <div class="admin-header__actions">
                <form class="admin-header-auth" data-admin-auth-form>
                    <input class="admin-header-auth__input" id="admin-password" type="password" autocomplete="current-password" placeholder="Password" data-admin-password-input>
                    <button class="admin-header-auth__hint" type="button" title="Password: server .env → ADMIN_LOGIN_HASH (hashed). Plain-text in your password manager.">i</button>
                    <button class="button button--plain-light button--pill button--sm" type="submit">Sign in</button>
                    <button class="button button--plain-light button--pill button--sm" type="button" data-admin-clear-auth>Sign out</button>
                </form>
                <span class="admin-header-auth__status" data-admin-auth-status></span>
                <a href="../../admin/inventory.html" class="button button--plain-light button--pill button--sm">DE</a>
            </div>
        </div>
        <div class="container">
            <nav class="admin-subnav" aria-label="Admin sections">
                <a href="./inventory.html" aria-current="page">Inventory</a>
                <a href="./orders.html">Orders</a>
                <a href="../checkout.html">View checkout</a>
                <a href="../index.html">Website</a>
            </nav>
        </div>
    </header>

    <main class="admin-shell">
        <div class="container admin-layout" data-admin-inventory data-locale="en" data-product-key="indiebox-ai-workstation">

            <nav class="admin-tabs" role="tablist" aria-label="Inventory sections">
                <button class="admin-tab" role="tab" aria-selected="true" data-tab="devices">Devices</button>
                <button class="admin-tab" role="tab" aria-selected="false" data-tab="procurement">Procurement</button>
                <button class="admin-tab" role="tab" aria-selected="false" data-tab="articles">Articles</button>
            </nav>

            <!-- Tab: Devices -->
            <div class="admin-tab-panel" data-tab-panel="devices">
                <div class="admin-grid">
                    <article class="admin-card">
                        <h2>Add device</h2>
                        <form class="admin-section-stack" data-admin-device-form>
                            <div class="form-row">
                                <label class="form-label" for="device-serial">Serial number</label>
                                <input class="form-input" id="device-serial" name="serialNumber" type="text" required>
                            </div>
                            <div class="form-grid">
                                <div class="form-row">
                                    <label class="form-label" for="device-username">Username</label>
                                    <input class="form-input" id="device-username" name="deviceUsername" type="text">
                                </div>
                                <div class="form-row">
                                    <label class="form-label" for="device-password">Password</label>
                                    <input class="form-input" id="device-password" name="devicePassword" type="text">
                                </div>
                            </div>
                            <div class="form-row">
                                <label class="form-label" for="device-notes">Notes</label>
                                <textarea class="form-textarea" id="device-notes" name="notes" rows="2"></textarea>
                            </div>
                            <button class="button button--plain-dark button--pill button--sm" type="submit">Add device</button>
                        </form>
                    </article>
                </div>
                <section class="admin-card" style="margin-top:1rem">
                    <h2>Devices in stock</h2>
                    <div class="admin-section-stack" data-admin-devices-list></div>
                </section>
            </div>

            <!-- Tab: Procurement -->
            <div class="admin-tab-panel" data-tab-panel="procurement" hidden>
                <div class="admin-grid">
                    <article class="admin-card">
                        <h2>New supplier order</h2>
                        <form class="admin-section-stack" data-admin-procurement-form>
                            <div class="form-grid">
                                <div class="form-row form-row--full">
                                    <label class="form-label" for="article-key">Article</label>
                                    <select class="form-input" id="article-key" name="productKey" data-article-select required>
                                        <option value="">— Select article —</option>
                                    </select>
                                </div>
                                <div class="form-row">
                                    <label class="form-label" for="supplier-name">Supplier</label>
                                    <input class="form-input" id="supplier-name" name="supplierName" type="text" required>
                                </div>
                                <div class="form-row">
                                    <label class="form-label" for="supplier-reference">Reference</label>
                                    <input class="form-input" id="supplier-reference" name="supplierReference" type="text">
                                </div>
                                <div class="form-row">
                                    <label class="form-label" for="quantity">Quantity</label>
                                    <input class="form-input" id="quantity" name="quantity" type="number" min="1" value="1" required>
                                </div>
                                <div class="form-row">
                                    <label class="form-label" for="supplier-status">Status</label>
                                    <select class="form-input" id="supplier-status" name="status">
                                        <option value="ordered">Ordered</option>
                                        <option value="in_transit">In transit</option>
                                        <option value="received">Received</option>
                                        <option value="in_stock">In stock</option>
                                        <option value="cancelled">Cancelled</option>
                                    </select>
                                </div>
                                <div class="form-row">
                                    <label class="form-label" for="price-per-item">Price per unit (€)</label>
                                    <input class="form-input" id="price-per-item" name="pricePerItem" type="text" placeholder="0.00">
                                </div>
                                <div class="form-row" style="align-items:center;display:flex;gap:0.5rem">
                                    <input type="checkbox" id="price-includes-vat" name="priceIncludesVat" value="true" style="width:auto;flex:none">
                                    <label class="form-label" for="price-includes-vat" style="margin:0">Price includes VAT</label>
                                </div>
                                <div class="form-row">
                                    <label class="form-label" for="ordered-at">Ordered</label>
                                    <input class="form-input" id="ordered-at" name="orderedAt" type="date">
                                </div>
                                <div class="form-row">
                                    <label class="form-label" for="expected-delivery">Expected delivery</label>
                                    <input class="form-input" id="expected-delivery" name="expectedDeliveryAt" type="date">
                                </div>
                                <div class="form-row">
                                    <label class="form-label" for="received-at">Received</label>
                                    <input class="form-input" id="received-at" name="receivedAt" type="date">
                                </div>
                                <div class="form-row form-row--full">
                                    <label class="form-label" for="supplier-notes">Notes</label>
                                    <textarea class="form-textarea" id="supplier-notes" name="notes" rows="2"></textarea>
                                </div>
                            </div>
                            <button class="button button--plain-dark button--pill button--sm" type="submit">Create supplier order</button>
                        </form>
                    </article>
                </div>
                <section class="admin-card" style="margin-top:1rem">
                    <h2>Existing supplier orders</h2>
                    <div class="admin-section-stack" data-admin-procurement-list></div>
                </section>
            </div>

            <!-- Tab: Articles -->
            <div class="admin-tab-panel" data-tab-panel="articles" hidden>
                <div class="admin-grid">
                    <article class="admin-card">
                        <h2>Create new article</h2>
                        <form class="admin-section-stack" data-admin-article-form>
                            <div class="form-row">
                                <label class="form-label" for="article-manufacturer">Manufacturer</label>
                                <input class="form-input" id="article-manufacturer" name="manufacturer" type="text" placeholder="e.g. ASUS, Minisforum">
                            </div>
                            <div class="form-row">
                                <label class="form-label" for="article-product-name">Article name *</label>
                                <input class="form-input" id="article-product-name" name="productName" type="text" required placeholder="e.g. NUC 14 Pro AI">
                            </div>
                            <div class="form-row">
                                <label class="form-label" for="article-system-spec">Specification</label>
                                <textarea class="form-textarea" id="article-system-spec" name="systemSpec" rows="3" placeholder="e.g. AMD Ryzen AI Max+ 395, 128 GB RAM, 2 TB SSD"></textarea>
                            </div>
                            <button class="button button--plain-dark button--pill button--sm" type="submit">Create article</button>
                        </form>
                    </article>
                    <article class="admin-card">
                        <h2>Customer reservations</h2>
                        <p class="admin-card-lead">Paid orders automatically reserve available stock.</p>
                        <div class="admin-section-stack" data-admin-allocations-list></div>
                    </article>
                </div>
                <section class="admin-card" style="margin-top:1rem">
                    <h2>Article catalogue</h2>
                    <div class="admin-section-stack" data-admin-articles-list></div>
                </section>
            </div>

            <div class="form-alert" data-admin-feedback hidden></div>
        </div>
    </main>

    <script src="../../script.js"></script>
</body>
</html>
