<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order placed – Indie.box</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <meta name="description" content="Return page after Mollie Checkout. The payment status is verified on the server side.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script src="../matomo.js" defer></script>
    <style>
        html, body { height: 100%; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f6f7fb;
        }
        .status-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .status-card {
            background: #fff;
            border-radius: 1.5rem;
            box-shadow: 0 8px 48px rgba(0,0,0,0.10);
            padding: 3rem 2.5rem 2.5rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .status-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.75rem;
        }
        .status-icon--success {
            background: #e6faf0;
            color: #16a34a;
            animation: pop 0.45s cubic-bezier(.36,1.6,.6,1) forwards;
        }
        .status-icon--error { background: #fee2e2; color: #dc2626; }
        .status-icon--warning { background: #fff7e6; color: #d97706; }
        .status-icon--loading { background: #eef0ff; color: #4361ee; }
        @keyframes pop {
            0%   { transform: scale(0.4); opacity: 0; }
            100% { transform: scale(1);   opacity: 1; }
        }
        .status-icon svg {
            width: 40px;
            height: 40px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .check-path {
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: drawCheck 0.4s ease 0.3s forwards;
        }
        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }
        .status-title {
            font-size: 1.625rem;
            font-weight: 700;
            margin: 0 0 0.875rem;
            color: #111;
            line-height: 1.25;
        }
        .status-message {
            font-size: 1rem;
            color: #555;
            line-height: 1.65;
            margin: 0 0 2rem;
        }
        .status-hint {
            font-size: 0.875rem;
            color: #888;
            margin: -1.25rem 0 2rem;
            line-height: 1.55;
        }
        .status-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #c7d2fe;
            border-top-color: #4361ee;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #confetti-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas" hidden></canvas>

    <main class="status-main">
        <div class="status-card" id="status-card">
            <div class="status-icon status-icon--loading">
                <div class="spinner"></div>
            </div>
            <h1 class="status-title">Checking payment…</h1>
            <p class="status-message">We are fetching your payment status. Please wait a moment.</p>
        </div>
    </main>

    <script>
    const params       = new URLSearchParams(window.location.search);
    const orderId      = params.get('order_id');
    const statusToken  = params.get('status_token');
    const card         = document.getElementById('status-card');
    let pollTimer      = null;
    let confettiDone   = false;

    const FINAL = new Set(['paid', 'failed', 'cancelled', 'expired', 'banktransfer']);

    const STATES = {
        paid: {
            iconType: 'success',
            icon: `<svg viewBox="0 0 24 24"><polyline class="check-path" points="4,13 9,18 20,7"/></svg>`,
            title: 'Order placed!',
            message: 'Your payment has been confirmed. You will shortly receive an <strong>order confirmation and invoice</strong> by email.',
            hint: 'You can close this window.',
            actions: [
                { label: 'Back to website', href: '../index.html', primary: true },
            ],
            confetti: true,
            clearDraft: true,
        },
        banktransfer: {
            iconType: 'success',
            icon: `<svg viewBox="0 0 24 24"><polyline class="check-path" points="4,13 9,18 20,7"/></svg>`,
            title: 'Order placed!',
            message: 'Your order has been created. Mollie has sent you the <strong>bank transfer details (IBAN and payment reference)</strong> by email. Once your payment arrives, you will receive an order confirmation and invoice.',
            hint: 'Processing may take 1–3 business days after your transfer is received.',
            actions: [],
            confetti: true,
            clearDraft: true,
        },
        pending: {
            iconType: 'loading',
            icon: null,
            title: 'Payment processing…',
            message: 'Your payment is still being processed. This page updates automatically.',
            actions: [],
            poll: true,
        },
        authorized: {
            iconType: 'loading',
            icon: null,
            title: 'Payment authorised…',
            message: 'Your payment has been authorised and is being finalised. This page updates automatically.',
            actions: [],
            poll: true,
        },
        payment_created: {
            iconType: 'loading',
            icon: null,
            title: 'Payment processing…',
            message: 'The response from Mollie is still being processed. Please wait a moment.',
            actions: [],
            poll: true,
        },
        open: {
            iconType: 'loading',
            icon: null,
            title: 'Payment processing…',
            message: 'Your payment is being processed. This page updates automatically.',
            actions: [],
            poll: true,
        },
        failed: {
            iconType: 'error',
            icon: `<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
            title: 'Payment failed',
            message: 'Unfortunately the payment could not be completed – for example due to insufficient funds or a technical issue. <strong>Your form data has been saved</strong> – it will be pre-filled when you try again.',
            actions: [
                { label: 'Try again', href: 'checkout.html', primary: true },
                { label: 'Contact us', href: '../index.html#contact', primary: false },
            ],
        },
        cancelled: {
            iconType: 'warning',
            icon: `<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
            title: 'Payment cancelled',
            message: 'You cancelled the payment. No worries – you can order again at any time or choose a different payment method. <strong>Your form data has been saved.</strong>',
            actions: [
                { label: 'Try again', href: 'checkout.html', primary: true },
            ],
        },
        expired: {
            iconType: 'warning',
            icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>`,
            title: 'Payment link expired',
            message: 'Unfortunately the payment link has expired. Please restart the checkout. <strong>Your form data has been saved</strong> – you won\'t need to re-enter it.',
            actions: [
                { label: 'Restart checkout', href: 'checkout.html', primary: true },
            ],
        },
        _missing: {
            iconType: 'error',
            icon: `<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
            title: 'No order found',
            message: 'No order ID was provided. Please check the link or restart the checkout.',
            actions: [
                { label: 'Open checkout', href: 'checkout.html', primary: true },
            ],
        },
        _error: {
            iconType: 'warning',
            icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
            title: 'Status unavailable',
            message: 'We could not fetch the status of your order right now. We will try again in a moment.',
            actions: [],
            poll: true,
        },
    };

    function renderState(key) {
        const s = STATES[key] || STATES._error;

        const iconHtml = s.icon
            ? `<div class="status-icon status-icon--${s.iconType}">${s.icon}</div>`
            : `<div class="status-icon status-icon--${s.iconType}"><div class="spinner"></div></div>`;

        const actionsHtml = (s.actions || []).map(a =>
            `<a href="${a.href}" class="button ${a.primary ? 'button--solid button--pill' : 'button--plain-dark button--pill'}">${a.label}</a>`
        ).join('');

        card.innerHTML = `
            ${iconHtml}
            <h1 class="status-title">${s.title}</h1>
            <p class="status-message">${s.message}</p>
            ${s.hint ? `<p class="status-hint">${s.hint}</p>` : ''}
            ${actionsHtml ? `<div class="status-actions">${actionsHtml}</div>` : ''}
        `;

        if (s.clearDraft) {
            try { localStorage.removeItem('indiebox_checkout_draft'); } catch { /* ignore */ }
        }

        if (s.confetti && !confettiDone) {
            confettiDone = true;
            launchConfetti();
        }
    }

    async function loadStatus() {
        if (!orderId || !statusToken) {
            renderState('_missing');
            return;
        }

        try {
            const res = await fetch(`/api/orders/status?order_id=${encodeURIComponent(orderId)}&status_token=${encodeURIComponent(statusToken)}`);
            if (!res.ok) {
                renderState('_error');
                scheduleReload();
                return;
            }

            const payload = await res.json();
            // Bank transfer: open status + banktransfer method = order placed, awaiting transfer
            let stateKey;
            if (payload.status === 'open' && payload.paymentMethod === 'banktransfer') {
                stateKey = 'banktransfer';
            } else {
                stateKey = STATES[payload.status] ? payload.status : '_error';
            }
            renderState(stateKey);

            if (!FINAL.has(stateKey)) {
                scheduleReload();
            }
        } catch {
            renderState('_error');
            scheduleReload();
        }
    }

    function scheduleReload() {
        window.clearTimeout(pollTimer);
        pollTimer = window.setTimeout(loadStatus, 3000);
    }

    function launchConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        canvas.hidden = false;
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const COLORS = ['#4361ee','#7b2d8b','#f72585','#4cc9f0','#06d6a0','#ffd166','#ef476f','#3a86ff'];
        const particles = [];

        for (let i = 0; i < 180; i++) {
            particles.push({
                x:        Math.random() * canvas.width,
                y:        -20 - Math.random() * canvas.height * 0.6,
                w:        7 + Math.random() * 9,
                h:        4 + Math.random() * 6,
                color:    COLORS[Math.floor(Math.random() * COLORS.length)],
                rot:      Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.18,
                vx:       (Math.random() - 0.5) * 2.5,
                vy:       2.5 + Math.random() * 3.5,
                alpha:    1,
            });
        }

        let startTime = null;

        function draw(ts) {
            if (!startTime) startTime = ts;
            const elapsed = ts - startTime;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let alive = 0;
            for (const p of particles) {
                p.x   += p.vx;
                p.y   += p.vy;
                p.rot += p.rotSpeed;
                if (elapsed > 2500) p.alpha = Math.max(0, p.alpha - 0.012);

                if (p.y < canvas.height + 30 && p.alpha > 0) {
                    alive++;
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                }
            }

            if (alive > 0) requestAnimationFrame(draw);
            else canvas.hidden = true;
        }

        requestAnimationFrame(draw);
    }

    loadStatus();
    </script>
</body>
</html>
