<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Indie.box</title>
    <meta name="description" content="Diese Seite existiert nicht. Lokal geprüft.">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0B1118;
            --fg:        #F3F7FB;
            --fg-muted:  rgba(243, 247, 251, 0.55);
            --accent:    #FF4D00;
            --border:    rgba(243, 247, 251, 0.1);
            --gradient:  linear-gradient(95deg, #c2410c 0%, #f97316 35%, #fb923c 68%, #fdba74 100%);
            --font:      'Inter', system-ui, -apple-system, sans-serif;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Nav */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(11, 17, 24, 0.85);
            backdrop-filter: blur(12px);
        }

        .nav-logo {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--fg);
            text-decoration: none;
            letter-spacing: -0.01em;
        }

        .nav-logo .dot {
            color: var(--accent);
        }

        .nav-home {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--fg-muted);
            text-decoration: none;
            letter-spacing: 0.01em;
            transition: color 0.15s;
        }

        .nav-home:hover {
            color: var(--fg);
        }

        /* Main */
        .page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 6rem 2rem 4rem;
            gap: 0;
        }

        /* Big 404 */
        .error-code {
            font-size: clamp(8rem, 22vw, 16rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.04em;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            user-select: none;
            margin-bottom: 0.1em;
        }

        /* Thin separator */
        .divider {
            width: 3rem;
            height: 1px;
            background: var(--border);
            margin: 2rem auto;
        }

        .headline {
            font-size: clamp(1.3rem, 2.5vw, 1.75rem);
            font-weight: 600;
            color: var(--fg);
            letter-spacing: -0.02em;
            line-height: 1.25;
            text-wrap: balance;
            margin-bottom: 1rem;
        }

        .subline {
            font-size: 1rem;
            font-weight: 400;
            color: var(--fg-muted);
            line-height: 1.65;
            max-width: 36ch;
            text-wrap: balance;
            margin: 0 auto 2.5rem;
        }

        .subline em {
            font-style: italic;
            color: rgba(243, 247, 251, 0.7);
        }

        /* CTA Button */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.75rem;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .btn:hover {
            background: #E64600;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Footer line */
        .footer {
            padding: 1.5rem 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(243, 247, 251, 0.25);
            letter-spacing: 0.02em;
        }

        @media (prefers-reduced-motion: reduce) {
            .btn { transition: none; }
        }
    </style>
</head>
<body>

<nav class="nav" aria-label="Navigation">
    <a class="nav-logo" href="/">Indie<span class="dot">.</span>box</a>
    <a class="nav-home" href="/">← Startseite</a>
</nav>

<main class="page">
    <div class="error-code" aria-label="Fehler 404">404</div>

    <div class="divider" aria-hidden="true"></div>

    <h1 class="headline">Sorry, diese Seite existiert nicht. 🤷</h1>
    <p class="subline">
        Lokal geprüft. Nichts gefunden. Wir haben zur Sicherheit
        auch noch <em>alle installierten Modelle</em> gefragt —
        kein einziges hatte eine Idee.
    </p>

    <a href="/" class="btn">Zurück zur Startseite</a>
</main>

<footer class="footer">© 2026 Indie.box &mdash; Private AI. Fully local. No cloud.</footer>

</body>
</html>
