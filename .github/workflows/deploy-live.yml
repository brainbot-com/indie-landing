name: Deploy to Production

# Deploys the static site to production (indiebox.ai). Two triggers:
#   1. Publish a GitHub Release  -> milestone deploy.
#   2. Run manually (Actions tab, "Run workflow").
#
# Required repo secrets:
#   SSH_PRIVATE_KEY  passphrase-less deploy key (public half in deploy@host authorized_keys)
#   DEPLOY_HOST      e.g. 87.106.111.141
#   DEPLOY_USER      e.g. deploy
#   LIVE_PATH        e.g. /srv/indiebox/app/site/
#
# Note: static front-end only. The backend (Docker) is deployed via
# deploy/scripts/push-stack.sh.

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  deploy:
    name: rsync → indiebox.ai
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy static site
        run: |
          rsync \
            --archive --verbose --compress --delete --delete-excluded \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".claude/" \
            --exclude ".codex/" \
            --exclude ".specify/" \
            --exclude ".vscode/" \
            --exclude ".local-data/" \
            --exclude "node_modules/" \
            --exclude "dist/" \
            --exclude "build/" \
            --exclude "backend/" \
            --exclude "bb_relaunch/" \
            --exclude "deploy/" \
            --exclude "i18n/" \
            --exclude "scripts/" \
            --exclude "specs/" \
            --exclude ".env" \
            --exclude ".DS_Store" \
            --exclude ".gitignore" \
            --exclude ".mcp.json*" \
            --exclude "*.yml" \
            --exclude "*.yaml" \
            --exclude "*.md" \
            ./ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.LIVE_PATH }}"

      - name: Report
        run: echo "✓ Deployed to https://indiebox.ai/"
