<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Users</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <meta name="description" content="Internal admin page for Indie.box user accounts and roles.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="docs-page admin-page" data-admin-auth-state="loading">
    <header class="admin-header">
        <div class="container admin-header__inner">
            <a class="admin-header__logo" href="./inventory.html" aria-label="Indie.box Admin">Indie.box Admin</a>
            <div class="admin-header__actions">
                <div class="admin-userbar" data-admin-userbar hidden>
                    <button class="admin-userbar__button" type="button" data-admin-user-toggle aria-haspopup="menu" aria-expanded="false">
                        <span class="admin-userbar__icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21a8 8 0 0 0-16 0"></path>
                                <circle cx="12" cy="8" r="4"></circle>
                            </svg>
                        </span>
                        <span class="admin-userbar__label" data-admin-user-label></span>
                    </button>
                    <div class="admin-userbar__menu" data-admin-user-menu hidden>
                        <button type="button" data-admin-change-password>Change password</button>
                        <button type="button" data-admin-clear-auth>Sign out</button>
                    </div>
                </div>
                <a href="./help.html#users" class="admin-header__help" title="Help" aria-label="Help">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><path d="M9.1 9a3 3 0 1 1 5.8 1c0 2-3 2-3 4"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                </a>
            </div>
        </div>
        <div class="container">
            <nav class="admin-subnav" aria-label="Admin sections">
                <a href="./inventory.html">Inventory</a>
                <a href="./orders.html">Orders</a>
                <a href="./users.html" aria-current="page">Users</a>
                <a href="./notifications.html">Notifications</a>
                <a href="../checkout.html">View checkout</a>
                <a href="../index.html">Website</a>
            </nav>
        </div>
    </header>

    <main class="admin-shell">
        <section class="container admin-login-screen" data-admin-login-screen>
            <div class="admin-login-card">
                <p class="admin-login-kicker">Internal Area</p>
                <h1>Admin Sign In</h1>
                <p>Sign in with an active account to manage users, roles, and access.</p>
                <form class="admin-login-form" data-admin-auth-form>
                    <div class="form-row">
                        <label class="form-label" for="admin-users-username">Username</label>
                        <input class="form-input" id="admin-users-username" type="text" autocomplete="username" placeholder="Username" data-admin-username-input>
                    </div>
                    <div class="form-row">
                        <label class="form-label" for="admin-users-password">Password</label>
                        <input class="form-input" id="admin-users-password" type="password" autocomplete="current-password" placeholder="Password" data-admin-password-input>
                    </div>
                    <button class="button button--plain-dark button--pill button--md" type="submit">Sign in</button>
                    <p class="admin-login-error" data-admin-login-error hidden></p>
                </form>
            </div>
        </section>
        <div class="container admin-layout" data-admin-users data-locale="en">

            <section class="admin-card">
                <div class="admin-card-header">
                    <h2>Users</h2>
                    <div class="admin-card-header__actions">
                        <button class="button button--plain-dark button--pill button--sm" type="button" data-admin-reload-users>Reload</button>
                        <button class="button button--plain-dark button--pill button--sm" type="button" data-admin-create-user>+ Create User</button>
                    </div>
                </div>
                <div class="admin-toolbar" data-admin-users-toolbar>
                    <div class="form-row">
                        <label class="form-label" for="admin-user-role-filter">Role</label>
                        <select class="form-input" id="admin-user-role-filter" data-admin-user-role-filter>
                            <option value="all">All</option>
                            <option value="admin">Admin</option>
                            <option value="user">User</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label class="form-label" for="admin-user-status-filter">Status</label>
                        <select class="form-input" id="admin-user-status-filter" data-admin-user-status-filter>
                            <option value="all">All</option>
                            <option value="active">Active</option>
                            <option value="disabled">Disabled</option>
                        </select>
                    </div>
                </div>
                <div class="admin-toolbar-meta">
                    <p class="admin-result-count" data-admin-user-count>0 users</p>
                </div>

                <div class="admin-orders-split">
                    <div class="admin-orders-list-pane">
                        <div class="admin-section-stack" data-admin-users-list></div>
                    </div>
                    <div class="admin-orders-detail-pane" data-admin-users-detail>
                        <div class="admin-detail-placeholder">
                            <p>Select a user to view details and manage their account.</p>
                        </div>
                    </div>
                </div>
            </section>

            <div class="admin-toast" data-admin-feedback hidden></div>
        </div>
    </main>

    <script src="../script.js"></script>
</body>
</html>
