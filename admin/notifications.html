<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Benachrichtigungen</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <meta name="description" content="Interne Verwaltungsseite für E-Mail-Templates und Benachrichtigungen der Indiebox.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="docs-page admin-page" data-admin-auth-state="loading">
    <header class="admin-header">
        <div class="container admin-header__inner">
            <a class="admin-header__logo" href="./inventory.html" aria-label="Indiebox Admin">Indiebox Admin</a>
            <div class="admin-header__actions">
                <div class="admin-userbar" data-admin-userbar hidden>
                    <button class="admin-userbar__button" type="button" data-admin-user-toggle aria-haspopup="menu" aria-expanded="false">
                        <span class="admin-userbar__icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21a8 8 0 0 0-16 0"></path>
                                <circle cx="12" cy="8" r="4"></circle>
                            </svg>
                        </span>
                        <span class="admin-userbar__label" data-admin-user-label></span>
                    </button>
                    <div class="admin-userbar__menu" data-admin-user-menu hidden>
                        <button type="button" data-admin-change-password>Passwort ändern</button>
                        <button type="button" data-admin-clear-auth>Abmelden</button>
                    </div>
                </div>
                <a href="./help.html#notifications" class="admin-header__help" title="Hilfe" aria-label="Hilfe">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><path d="M9.1 9a3 3 0 1 1 5.8 1c0 2-3 2-3 4"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                </a>
                <a href="../en/admin/notifications.html" class="button button--plain-light button--pill button--sm">EN</a>
            </div>
        </div>
        <div class="container">
            <nav class="admin-subnav" aria-label="Admin-Bereiche">
                <a href="./inventory.html">Bestand</a>
                <a href="./orders.html">Bestellungen</a>
                <a href="./users.html">Benutzer</a>
                <a href="./notifications.html" aria-current="page">Benachrichtigungen</a>
                <a href="../checkout.html">Checkout ansehen</a>
                <a href="../index.html">Website</a>
            </nav>
        </div>
    </header>

    <main class="admin-shell">
        <section class="container admin-login-screen" data-admin-login-screen>
            <div class="admin-login-card">
                <p class="admin-login-kicker">Interner Bereich</p>
                <h1>Admin-Anmeldung</h1>
                <p>Mit einem aktiven Konto anmelden, um E-Mail-Templates zu verwalten.</p>
                <form class="admin-login-form" data-admin-auth-form>
                    <div class="form-row">
                        <label class="form-label" for="admin-notif-username">Benutzer</label>
                        <input class="form-input" id="admin-notif-username" type="text" autocomplete="username" placeholder="Benutzername" data-admin-username-input>
                    </div>
                    <div class="form-row">
                        <label class="form-label" for="admin-notif-password">Passwort</label>
                        <input class="form-input" id="admin-notif-password" type="password" autocomplete="current-password" placeholder="Passwort" data-admin-password-input>
                    </div>
                    <button class="button button--plain-dark button--pill button--md" type="submit">Anmelden</button>
                    <p class="admin-login-error" data-admin-login-error hidden></p>
                </form>
            </div>
        </section>

        <div class="container admin-layout" data-admin-notifications data-locale="de">
            <section class="admin-card">
                <div class="admin-card-header">
                    <h2>Benachrichtigungs-Templates</h2>
                    <div class="admin-card-header__actions">
                        <button class="button button--plain-light button--pill button--sm" type="button" data-admin-notif-import-bundle>Mail-Template importieren</button>
                        <button class="button button--plain-dark button--pill button--sm" type="button" data-admin-notif-reload>Neu laden</button>
                    </div>
                </div>

                <p class="admin-notif-status" data-admin-notif-status hidden></p>

                <div class="admin-orders-split">
                    <div class="admin-orders-list-pane">
                        <div class="admin-section-stack" data-admin-notif-list></div>
                    </div>
                    <div class="admin-orders-detail-pane" data-admin-notif-detail>
                        <div class="admin-detail-placeholder">
                            <p>Ein Template aus der Liste wählen, um Inhalte zu bearbeiten.</p>
                        </div>
                    </div>
                </div>
            </section>

            <div class="admin-toast" data-admin-feedback hidden></div>
        </div>
    </main>

    <script src="../script.js"></script>
</body>
</html>
