<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:30px;background:#F7F9FC;font-family:var(--font-main)}
.gf{position:relative;border-radius:28px;padding:26px;border:2px solid transparent;background-color:#fff;background-image:linear-gradient(#fff,#fff),var(--gradient-prism);background-origin:padding-box,border-box;background-clip:padding-box,border-box;box-shadow:0 22px 50px rgba(255,77,0,0.14),0 10px 26px rgba(10,37,64,0.08)}
.gf h3{font-size:22px;color:var(--ib-navy);margin:0 0 6px;font-weight:700;letter-spacing:-0.02em}
.gf p{margin:0;font-size:14px;color:rgba(11,34,52,0.7);line-height:1.55}
.gf .k{font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(11,34,52,0.55);margin-bottom:6px}
</style></head><body>
<div class="gf">
  <div class="k">PREMIUM CALLOUT</div>
  <h3>Die Indie.box-Referenz</h3>
  <p>The glow-frame: 2px prism gradient border via background-origin trick, white surface, and a soft orange outer glow. Reserved for premium callouts and the final CTA.</p>
</div>
</body></html>
