<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:28px;background:#F7F9FC;font-family:var(--font-main)}
.box{padding:22px;background:#fff;border-radius:22px;border:1px solid rgba(11,34,52,0.08);box-shadow:0 18px 40px rgba(11,34,52,0.08);max-width:640px}
.k{font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(11,34,52,0.55);margin:0 0 10px}
.d{font-size:22px;line-height:1.06;letter-spacing:-0.01em;font-weight:700;color:var(--ib-navy);margin:0 0 10px}
.b{font-size:14px;line-height:1.65;color:rgba(11,34,52,0.72);margin:0 0 14px}
.meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(11,34,52,0.55)}
.cta{display:inline-flex;align-items:center;gap:10px;padding:6px 6px 6px 16px;border-radius:999px;border:1px solid rgba(10,37,64,0.12)}
.cta .t{font-weight:650;color:var(--ib-navy);font-size:13.5px}
.cta .plus{background:var(--ib-orange);color:#fff;width:24px;height:24px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center}
.cta .plus svg{width:12px;height:12px}
</style></head><body>
<div class="box">
  <p class="k">PRIVATSPHÄRE</p>
  <p class="d">ALLES BLEIBT AUF DER BOX</p>
  <p class="b">Indie.box verarbeitet Prompts, Dateien und Antworten komplett lokal auf der Box. Standardmäßig geht nichts in die Cloud, keine Telemetrie.</p>
  <div class="meta"><span class="tag">Für Datenschutz-Enthusiasten</span><span class="cta"><span class="t">Mehr zur Datensicherheit</span><span class="plus"><svg viewBox="0 0 16 16"><path d="M8 3.2v9.6M3.2 8h9.6" stroke="currentColor" stroke-width="2.6" fill="none" stroke-linecap="round"/></svg></span></span></div>
</div>
</body></html>
